name: Bug report
description: Report a reproducible problem in the VS Code extension or desktop app.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Structured Doc Editor. Please remove private or proprietary document content before attaching files.
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - VS Code extension
        - Windows desktop app
        - Both
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.4.14
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the smallest safe sample document or steps that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, VS Code version, and any relevant extension details.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, personal data, and proprietary document content from this report.
          required: true
