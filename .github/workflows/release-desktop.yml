name: Release Desktop

# Build the Windows Tauri app and attach installers to a GitHub Release.
# Trigger: push a version tag (v*) that matches package.json, or run manually
# (manual runs only upload workflow artifacts; they do not create a Release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      # Match local/CI Rust checks; rust-toolchain.toml also pins 1.90.0.
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tauri-app

      - name: Install npm dependencies
        run: npm ci

      - name: Verify package versions are synchronized
        run: npm run version:check

      - name: Verify third-party notices
        run: npm run licenses:check

      - name: Build CLI package
        run: npm run package:cli

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $expected = "v$($pkg.version)"
          if ($tag -ne $expected) {
            Write-Error "Git tag '$tag' does not match package.json version '$expected'."
            exit 1
          }
          Write-Host "Tag $tag matches package version."

      - name: Build Tauri desktop (NSIS, MSI, portable EXE)
        run: npm run tauri:build --workspace=sdoc-editor-tauri

      - name: Inspect release artifacts for private paths and retired branding
        run: npm run release:check-artifacts

      - name: List bundle outputs
        shell: pwsh
        run: |
          $roots = @(
            'tauri-app/target/release/bundle/nsis',
            'tauri-app/target/release/bundle/msi',
            'tauri-app/target/release/bundle/portable'
          )
          foreach ($root in $roots) {
            if (Test-Path $root) {
              Get-ChildItem -Path $root -Recurse -File | ForEach-Object { $_.FullName }
            } else {
              Write-Host "Missing directory: $root"
            }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdoc-editor-windows
          path: |
            tauri-app/target/release/bundle/nsis/*
            tauri-app/target/release/bundle/msi/*
            tauri-app/target/release/bundle/portable/*.zip
          if-no-files-found: error

      - name: Upload CLI workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdoc-editor-cli
          path: output/*.tgz
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Structured Doc Editor ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            tauri-app/target/release/bundle/nsis/*
            tauri-app/target/release/bundle/msi/*
            tauri-app/target/release/bundle/portable/*.zip
            output/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
