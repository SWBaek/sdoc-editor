name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build:all
      - run: npm run package
      - run: npm run package:cli
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vsix
          path: output/*.vsix
          if-no-files-found: error

  cli-package:
    name: CLI package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run package:cli
      - name: Inspect CLI package contents
        run: npm pack --dry-run ./cli
      - name: Install package and run sdoc (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package="$(realpath "$(find output -maxdepth 1 -type f -name '*.tgz' -print -quit)")"
          test -n "$package"
          prefix="$RUNNER_TEMP/sdoc-cli"
          npm install --global --prefix "$prefix" "$package"
          "$prefix/bin/sdoc" --version
      - name: Install package and run sdoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = Get-ChildItem output -Filter '*.tgz' |
            Select-Object -First 1
          if (-not $package) {
            throw 'package:cli did not create a .tgz file.'
          }
          $prefix = Join-Path $env:RUNNER_TEMP 'sdoc-cli'
          npm install --global --prefix $prefix $package.FullName
          $env:PATH = "$prefix;$env:PATH"
          sdoc --version
          sdoc.cmd --version
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-package-${{ matrix.os }}
          path: output/*.tgz
          if-no-files-found: error

  rust:
    runs-on: windows-latest
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: tauri-app
      - run: npm ci
      - run: npm run licenses:check
      - run: cargo fmt --manifest-path tauri-app/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path tauri-app/Cargo.toml --workspace --all-targets -- -D warnings
      - run: cargo test --manifest-path tauri-app/Cargo.toml --workspace
