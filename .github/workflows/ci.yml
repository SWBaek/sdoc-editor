name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build:all
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: output/*

  rust:
    runs-on: windows-latest
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app
      - run: cargo fmt --manifest-path tauri-app/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path tauri-app/Cargo.toml --workspace --all-targets -- -D warnings
      - run: cargo test --manifest-path tauri-app/Cargo.toml --workspace
