name: Publish VS Code Extension

# Package and publish the VS Code extension for matching v* release tags.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Package and publish VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: vscode-marketplace

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        run: npm ci

      - name: Verify package versions are synchronized
        run: npm run version:check

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $expected = "v$($pkg.version)"
          if ($tag -ne $expected) {
            Write-Error "Git tag '$tag' does not match package.json version '$expected'."
            exit 1
          }

      - name: Verify Marketplace authorization
        run: npx vsce verify-pat swbaek --azure-credential

      - name: Package VSIX
        run: npm run package

      - name: Publish VSIX to Visual Studio Marketplace
        run: npx vsce publish --azure-credential --packagePath output/structured-doc-editor-*.vsix --skip-duplicate
