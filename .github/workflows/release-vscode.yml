name: Publish VS Code Extension

# Package and publish the VS Code extension for matching v* release tags.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to publish during a release retry
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Package and publish VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: vscode-marketplace

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@8c334a195cbb38e46038007b304988d888bf676a # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        run: npm ci

      - name: Verify package versions are synchronized
        run: npm run version:check

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.release_tag }}'
          } else {
            '${{ github.ref_name }}'
          }
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $expected = "v$($pkg.version)"
          if ($tag -ne $expected) {
            Write-Error "Git tag '$tag' does not match package.json version '$expected'."
            exit 1
          }

      - name: Verify Marketplace authorization
        run: npx vsce verify-pat swbaek --azure-credential

      - name: Package VSIX
        run: npm run package

      - name: Publish VSIX to Visual Studio Marketplace
        run: npx vsce publish --azure-credential --packagePath output/structured-doc-editor-*.vsix --skip-duplicate
